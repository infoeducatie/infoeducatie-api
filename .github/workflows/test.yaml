name: Run tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAILS_ENV: test
      RACK_ENV: test
      DB_HOST: 127.0.0.1
      DB_USER: postgres
      DB_PASSWORD: postgres
      DISABLE_EMAIL: "true"
      DISCOURSE_API: ""
      DISCOURSE_USER: ""
      SECRET_KEY_BASE: test-only-secret-key-base
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: infoeducatie_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d infoeducatie_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install --yes imagemagick

      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: 4.0.6
          bundler-cache: true

      - name: Load database schema
        run: bundle exec rails db:schema:load

      - name: Run regression suite
        run: bundle exec rspec

      - name: Verify eager loading
        run: bundle exec rails zeitwerk:check

      - name: Scan Rails code
        run: bundle exec brakeman --no-pager --quiet

      - name: Scan gem advisories
        run: bundle exec bundle-audit check --update

      - name: Build production image
        run: docker build --tag infoeducatie-api:test .
